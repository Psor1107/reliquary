name: Reliquary CLI Integration Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-injection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Reliquary
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fabricar Banco de Dados Efêmero (Seed Data)
        run: python .github/scripts/seed_ci.py

      - name: Run Target App with Reliquary Injection
        # A flag --secrets-file garante que ele leia o YAML correto na pasta examples/
        run: |
          python -m reliquary.cli --db-path ci_dummy.db --password "senha_falsa_de_ci" --secrets-file examples/secrets.yml -- python examples/app_alvo.py