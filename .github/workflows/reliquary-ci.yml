name: Reliquary Integration Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-injection:
    runs-on: ubuntu-latest

    env:
      MASTER_PASSWORD: ${{ secrets.MASTER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Reliquary
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create ephemeral test vault
        run: |
          python .github/scripts/seed_ci.py

      - name: Run target application through Reliquary
        run: |
          python -m reliquary.cli \
            --db-path ci_dummy.db \
            --password "$MASTER_PASSWORD" \
            --secrets-file examples/secrets.yml \
            -- \
            python examples/app_alvo.py
